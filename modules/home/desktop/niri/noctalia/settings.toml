config_version = 2

[hooks]
session_unlocked = "restore-window-focus"

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [ "lockscreen-login-box@Virtual-1", "lockscreen-login-box@DP-3" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-3"]
    box_height = 70.0
    box_width = 400.0
    cx = 1280.0
    cy = 1321.0
    output = "DP-3"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@DP-3".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

    [lockscreen_widgets.widget."lockscreen-login-box@Virtual-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 960.0
    cy = 961.0
    output = "Virtual-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@Virtual-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

[plugin_settings."noctalia/screen_recorder"]
audio_source = "both"

[plugins]
enabled = [ "noctalia/wallhaven", "noctalia/timer", "noctalia/screen_recorder" ]

[theme.templates]
builtin_ids = [ "btop", "gtk3", "gtk4", "helix", "hyprland", "qt", "wezterm" ]

[wallpaper.default]
path = "~/.local/share/wallpapers/wallpaper.png"

[wallpaper.last]
path = "~/.local/share/wallpapers/wallpaper.png"

[wallpaper.monitors.DP-3]
path = "~/.local/share/wallpapers/wallpaper.png"