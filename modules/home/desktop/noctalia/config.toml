[audio]
enable_overdrive = false
enable_sounds = true
sound_volume = 1.0

[bar]
order = [ "main" ]

    [bar.main]
    auto_hide = false
    background_opacity = 0.4999999888241291
    capsule = false
    center = [ "date", "clock", "spacer_2", "privacy", "spacer_3", "media" ]
    contact_shadow = true
    end = [
        "output_volume",
        "input_volume",
        "clipboard",
        "notifications",
        "caffeine",
        "recorder",
        "screenshot",
        "tray",
        "spacer_4",
        "control-center",
        "spacer"
    ]
    margin_edge = 0
    margin_ends = 0
    margin_h = 4
    margin_v = 4
    padding = 2
    position = "top"
    radius = 0
    reserve_space = true
    shadow = true
    start = [ "spacer", "workspaces", "spacer_5", "active_window" ]
    thickness = 34
    widget_spacing = 6

[battery.device."/org/freedesktop/UPower/devices/ups_hiddev1"]
warning_threshold = 20

[brightness]
enable_ddcutil = true

[[control_center.shortcuts]]
type = "wifi"

[[control_center.shortcuts]]
type = "bluetooth"

[[control_center.shortcuts]]
type = "notification"

[[control_center.shortcuts]]
type = "power_profile"

[[control_center.shortcuts]]
type = "session"

[[control_center.shortcuts]]
type = "caffeine"

[desktop_widgets]
enabled = false

[dock]
enabled = false
pinned = []
position = "bottom"
show_dots = false
show_instance_count = true

[idle]
pre_action_fade_seconds = 5.0

    [idle.behavior.lock]
    command = "/home/jwilger/.local/bin/lock-screen"
    enabled = true
    timeout = 300

    [idle.behavior.screen-off]
    command = "noctalia:dpms-off"
    enabled = true
    resume_command = "noctalia:dpms-on"
    timeout = 360

[location]
address = "Forest Grove, OR, USA"
auto_locate = false
sunrise = "06:30"
sunset = "18:30"

[lockscreen]
blur_intensity = 0.10000000000000001
blurred_desktop = false
enabled = true
tint_intensity = 0.10000000000000001

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [ "lockscreen-login-box@DP-3" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-3"]
    box_height = 70.0
    box_width = 400.0
    cx = 1280.0
    cy = 1321.0
    output = "DP-3"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@DP-3".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

[nightlight]
enabled = true
force = false
temperature_day = 6500
temperature_night = 4000

[notification]
background_opacity = 0.80000000000000004
enable_daemon = true
layer = "overlay"
offset_x = 20
offset_y = 8

[osd]
background_opacity = 1.0
offset_x = 20
offset_y = 8
orientation = "horizontal"
position = "top_right"
position_vertical = "top_center"

[plugins]
enabled = [ "noctalia/screen_recorder", "noctalia/wallhaven" ]

[shell]
app_icon_colorize = true
date_format = "%A, %x"
font_family = "JetBrainsMono Nerd Font Mono"
launch_apps_as_systemd_services = true
password_style = "random"
polkit_agent = true
settings_show_advanced = true
telemetry_enabled = false
time_format = "{:%H:%M}"

    [shell.launcher]
    session_search = true
    settings_search = true
    sort_by_usage = true
    terminal_command = "wezterm"
    window_search = true

    [shell.panel]
    clipboard_placement = "centered"
    control_center_placement = "attached"
    launcher_placement = "centered"
    open_near_click_control_center = true
    polkit_placement = "floating"
    polkit_position = "center"
    session_placement = "attached"
    transparency_mode = "glass"
    wallpaper_placement = "attached"

    [shell.screenshot]
    confirm_region = true

    [[shell.session.actions]]
    action = "lock"
    countdown_seconds = 0
    enabled = true

    [[shell.session.actions]]
    action = "suspend"
    countdown_seconds = 10
    enabled = false

    [[shell.session.actions]]
    action = "reboot"
    countdown_seconds = 10
    enabled = true

    [[shell.session.actions]]
    action = "logout"
    countdown_seconds = 10
    enabled = true

    [[shell.session.actions]]
    action = "shutdown"
    countdown_seconds = 10
    enabled = false

[system.monitor]
gpu_poll_seconds = 2

[theme]
builtin = "Catppuccin"
community_palette = "Oxocarbon"
mode = "dark"
source = "builtin"
wallpaper_scheme = "m3-content"

    [theme.templates]
    builtin_ids = [ "btop", "gtk3", "gtk4", "helix", "hyprland", "qt", "wezterm" ]
    community_ids = [ "pi-agent", "steam", "telegram", "yazi" ]

[wallpaper]
directory = "~/.local/share/wallpapers"
edge_smoothness = 0.050000000000000003
enabled = true
fill_mode = "crop"
transition = [ "fade", "wipe", "disc", "stripes", "zoom", "honeycomb" ]
transition_duration = 1500

    [wallpaper.default]
    path = "~/.local/share/wallpapers/wallpaper.png"

    [wallpaper.last]
    path = "~/.local/share/wallpapers/wallpaper.png"

    [wallpaper.monitors.DP-3]
    path = "~/.local/share/wallpapers/wallpaper.png"

[weather]
effects = true
enabled = true
unit = "fahrenheit"

[widget.active_window]
max_length = 600

[widget.control-center]
custom_image = "/home/jwilger/.config/noctalia/assets/nixos.svg"
custom_image_colorize = true
glyph = "shutdown"

[widget.input_volume]
show_label = false

[widget.launcher]
glyph = "target"

[widget.media]
hide_when_no_media = true
max_length = 600
title_scroll = "on_hover"

[widget.output_volume]
show_label = false

[widget.recorder]
type = "noctalia/screen_recorder:recorder"

[widget.spacer_2]
type = "spacer"

[widget.spacer_3]
type = "spacer"

[widget.spacer_4]
type = "spacer"

[widget.spacer_5]
type = "spacer"

[widget.tray]
match_adjacent_spacing = true

[widget.volume]
show_label = false
[hooks]
session_unlocked = "restore-window-focus"
